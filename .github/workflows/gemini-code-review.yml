name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');

            // 베이스 브랜치 fetch
            const baseBranch = context.payload.pull_request.base.ref;
            try {
              execSync(`git fetch origin ${baseBranch}`, { stdio: 'pipe' });
            } catch (e) {
              core.warning(`Failed to fetch base branch: ${e.message}`);
            }

            // 변경된 소스 파일 diff 추출 (lock 파일 제외)
            let diff = '';
            try {
              diff = execSync(
                `git diff origin/${baseBranch}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.css' '*.json' ':!pnpm-lock.yaml' ':!package-lock.json'`,
                { stdio: 'pipe' }
              ).toString();
            } catch (e) {
              core.warning(`Failed to get diff: ${e.message}`);
            }

            if (!diff.trim()) {
              core.info('No relevant diff found. Skipping Gemini review.');
              return;
            }

            // diff가 너무 길면 잘라냄
            // gemini-2.0-flash 입력 토큰 한도(~1M) 내에서 안정적으로 처리되는 문자 수 기준
            const MAX_DIFF_LENGTH = 28000;
            let truncated = false;
            if (diff.length > MAX_DIFF_LENGTH) {
              diff = diff.substring(0, MAX_DIFF_LENGTH);
              truncated = true;
            }

            const prompt = `당신은 MATE-FE 프로젝트의 시니어 프론트엔드 개발자입니다.
            아래 프로젝트 컨텍스트와 코딩 규칙을 숙지한 후 PR diff를 리뷰해 주세요.

            ## 프로젝트 컨텍스트
            - **앱인토스(Apps in Toss) 미니앱** — 일반 SPA 기준이 아닌 플랫폼 제약을 고려해야 함
            - **패키지 매니저:** pnpm 전용
            - **빌드:** Vite + React (Next.js 패턴 금지)
            - **HTTP:** ky 사용 (fetch 직접 사용 금지), API 로직은 컴포넌트에서 분리
            - **서버 상태:** TanStack Query (useEffect로 데이터 관리 지양, mutation 후 invalidate)
            - **전역 상태:** Zustand 최소화 (서버 데이터는 Query로만 관리)
            - **스타일:** Tailwind CSS + TDS(Toss Design System) 우선 (임의 디자인 구현 금지)
            - **라우팅:** TanStack Router (경로 하드코딩 금지)
            - **아키텍처:** FSD(Feature-Sliced Design) — shared / features / entities / pages 역할 분리

            ## 리뷰 시 중점 체크사항
            1. FSD 레이어 규칙 위반 여부
            2. TDS 컴포넌트 미사용 (버튼, 인풋, 모달 등)
            3. fetch 직접 사용 또는 API 로직이 컴포넌트 내부에 있는 경우
            4. 서버 데이터를 Zustand에 저장하는 경우
            5. useEffect로 데이터 페칭하는 경우
            6. TypeScript any 남용
            7. 에러 처리 누락
            8. 경로 하드코딩
            9. 모바일/웹뷰 환경 미고려 (터치, 스크롤)

            ## 리뷰 형식
            다음 섹션으로 작성해 주세요 (마크다운):
            - **✅ 잘된 점** (긍정적인 부분)
            - **⚠️ 개선 필요** (수정 권고 사항, 위치와 이유 명시)
            - **🚫 필수 수정** (규칙 위반 또는 버그, 반드시 수정해야 할 항목)
            - **💡 제안** (선택적 개선사항)

            리뷰는 한국어로 작성하고, 구체적인 파일명과 코드 위치를 포함해 주세요.
            ${truncated ? '\n> ⚠️ diff가 너무 길어 일부만 분석되었습니다.\n' : ''}

            ## PR Diff
            \`\`\`diff
            ${diff}
            \`\`\``;

            // Gemini API 호출
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              core.setFailed('GEMINI_API_KEY secret이 설정되지 않았습니다. 레포지토리 Settings > Secrets에 추가해 주세요.');
              return;
            }

            let reviewText = '';
            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': apiKey,
                  },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.2,
                      maxOutputTokens: 4096,
                    },
                  }),
                }
              );

              if (!response.ok) {
                const errorBody = await response.text();
                core.setFailed(`Gemini API 오류 (${response.status}): ${errorBody}`);
                return;
              }

              const data = await response.json();
              reviewText = data?.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
            } catch (e) {
              core.setFailed(`Gemini API 호출 실패: ${e.message}`);
              return;
            }

            if (!reviewText.trim()) {
              core.warning('Gemini가 빈 리뷰를 반환했습니다.');
              return;
            }

            // PR 댓글 게시
            const body = `## 🤖 Gemini Code Review\n\n${reviewText}\n\n---\n*powered by gemini-1.5-flash — [MATE-FE 코딩 규칙](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/GEMINI.md)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            core.info('Gemini 코드리뷰 댓글이 게시되었습니다.');
